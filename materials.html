<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Materials - CodeTMC Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        background: '#0f172a',
                        card: '#1e293b',
                        sidebar: '#111827'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-white flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-sidebar border-r border-white/5 flex flex-col shrink-0">
        <div class="p-6">
            <div class="flex items-center gap-2 mb-10">
                <div class="bg-primary p-1.5 rounded-lg">
                    <i data-lucide="graduation-cap" class="size-5 text-white"></i>
                </div>
                <span class="font-bold text-lg">CodeTMC</span>
            </div>
            <nav class="space-y-2">
                <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-all">
                    <i data-lucide="layout-dashboard" class="size-5"></i> Dashboard
                </a>
                <a href="materials.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-primary/10 text-primary font-medium">
                    <i data-lucide="file-text" class="size-5"></i> Study Materials
                </a>
                <a href="quizzes.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-all">
                    <i data-lucide="award" class="size-5"></i> Mock Tests
                </a>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">
        <header class="mb-8">
            <h1 class="text-2xl font-bold">Study Materials</h1>
            <p class="text-gray-400 text-sm">Download premium notes and past question collections.</p>
        </header>

        <!-- Search Bar -->
        <div class="relative max-w-xl mb-8">
            <i data-lucide="search" class="absolute left-4 top-3 size-5 text-gray-500"></i>
            <input type="text" placeholder="Search for 'Physics' or 'IOE Past Questions'..." class="w-full bg-card border border-white/10 rounded-xl py-2.5 pl-12 pr-4 focus:outline-none focus:border-primary">
        </div>

        <!-- Material Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <!-- Category: Physics -->
            <div class="bg-card border border-white/5 p-6 rounded-2xl">
                <div class="flex items-center justify-between mb-6">
                    <div class="p-3 bg-blue-500/10 rounded-xl text-blue-400">
                        <i data-lucide="atom" class="size-6"></i>
                    </div>
                    <span class="text-xs bg-white/5 px-2 py-1 rounded text-gray-400">12 Files</span>
                </div>
                <h3 class="font-bold text-lg mb-4">Physics (IOE/CEE)</h3>
                <ul class="space-y-3">
                    <li class="flex items-center justify-between group cursor-pointer">
                        <div class="flex items-center gap-2 text-sm text-gray-300 group-hover:text-white transition-colors">
                            <i data-lucide="file" class="size-4 text-gray-500"></i> Optics Shortcuts
                        </div>
                        <i data-lucide="download" class="size-4 text-gray-600 group-hover:text-primary"></i>
                    </li>
                    <li class="flex items-center justify-between group cursor-pointer">
                        <div class="flex items-center gap-2 text-sm text-gray-300 group-hover:text-white transition-colors">
                            <i data-lucide="file" class="size-4 text-gray-500"></i> Mechanics Revision
                        </div>
                        <i data-lucide="download" class="size-4 text-gray-600 group-hover:text-primary"></i>
                    </li>
                </ul>
            </div>

            <!-- Category: Chemistry -->
            <div class="bg-card border border-white/5 p-6 rounded-2xl">
                <div class="flex items-center justify-between mb-6">
                    <div class="p-3 bg-green-500/10 rounded-xl text-green-400">
                        <i data-lucide="beaker" class="size-6"></i>
                    </div>
                    <span class="text-xs bg-white/5 px-2 py-1 rounded text-gray-400">8 Files</span>
                </div>
                <h3 class="font-bold text-lg mb-4">Chemistry</h3>
                <ul class="space-y-3">
                    <li class="flex items-center justify-between group cursor-pointer">
                        <div class="flex items-center gap-2 text-sm text-gray-300 group-hover:text-white transition-colors">
                            <i data-lucide="file" class="size-4 text-gray-500"></i> Reaction Mechanisms
                        </div>
                        <i data-lucide="download" class="size-4 text-gray-600 group-hover:text-primary"></i>
                    </li>
                </ul>
            </div>

        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
